workflows:
  ios-pr-check:
    name: SnapStudy Play - PR Check
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      vars:
        XCODE_PROJECT: "SnapStudyPlay.xcodeproj"
        XCODE_SCHEME: "SnapStudyPlay"
      xcode: latest

    triggering:
      events:
        - pull_request
      branch_patterns:
        - pattern: "*"
          include: true

    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          xcodegen generate --spec project.yml

      - name: Run tests
        script: |
          xcodebuild test \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -derivedDataPath DerivedData

    artifacts:
      - DerivedData/Logs/Test/**/*.xcresult

  ios-development:
    name: SnapStudy Play - iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      vars:
        XCODE_PROJECT: "SnapStudyPlay.xcodeproj"
        XCODE_SCHEME: "SnapStudyPlay"
        BUNDLE_ID: "no.snapstudy.play"
      xcode: latest

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          xcodegen generate --spec project.yml

      - name: Set up code signing
        script: |
          CERT_KEY_PATH="$CM_BUILD_DIR/codemagic_distribution.key"
          openssl genrsa -out "$CERT_KEY_PATH" 2048
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "@env:APP_STORE_CONNECT_PRIVATE_KEY" \
            --certificate-key "@file:$CERT_KEY_PATH"
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

      - name: Run tests
        script: |
          xcodebuild test \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -derivedDataPath DerivedData

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
      - DerivedData/Build/Products/**/*.app

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
