workflows:
  ios-pr-check:
    name: SnapStudy Play - PR Check
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      vars:
        XCODE_PROJECT: "SnapStudyPlay.xcodeproj"
        XCODE_SCHEME: "SnapStudyPlay"
      xcode: latest

    triggering:
      events:
        - pull_request
      branch_patterns:
        - pattern: "*"
          include: true

    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          xcodegen generate --spec project.yml

      - name: Run tests
        script: |
          xcodebuild test \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -derivedDataPath DerivedData

    artifacts:
      - DerivedData/Logs/Test/**/*.xcresult

  ios-development:
    name: SnapStudy Play - iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - snapstudy_appstoreconnect
      vars:
        XCODE_PROJECT: "SnapStudyPlay.xcodeproj"
        XCODE_SCHEME: "SnapStudyPlay"
        BUNDLE_ID: "no.snapstudy.play"
      xcode: latest

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          xcodegen generate --spec project.yml

      - name: Set up code signing
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "@env:APP_STORE_CONNECT_PRIVATE_KEY" \
            --certificate-key "@env:CM_DISTRIBUTION_CERT_PRIVATE_KEY"
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --verbose

      - name: Run tests
        script: |
          xcodebuild test \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -derivedDataPath DerivedData

      - name: Publish to TestFlight
        script: |
          app-store-connect publish \
            --path "build/ios/ipa/*.ipa" \
            --testflight \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "@env:APP_STORE_CONNECT_PRIVATE_KEY" \
            --verbose

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/xcarchive/*.xcarchive
      - DerivedData/Build/Products/**/*.app
